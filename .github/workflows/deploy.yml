
name: Deploy Fullstack App
 
on:
  push:
    branches:
      - main
 
jobs:
  deploy:
    runs-on: ubuntu-latest
 
    steps:
      # 1. Clonar el repositorio
      - name: Checkout código
        uses: actions/checkout@v4
 
      # 2. Compilar Backend (Spring Boot)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
 
      - name: Build Backend con Maven
        run: mvn clean package -DskipTests
        working-directory: ./tasf
 
      # 3. Compilar Frontend (React)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Build Frontend
        run: |
          npm install --legacy-peer-deps
          npm run build
        working-directory: ./tasf-frontend
 
      # 4. Copiar Backend a la carpeta home (no necesita sudo)
      - name: Copiar Backend al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "tasf/target/*.jar"
          target: "~/deploy-temp/backend/"
          strip_components: 2
 
      # 5. Copiar Frontend a la carpeta home (no necesita sudo)
      - name: Copiar Frontend al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "tasf-frontend/dist/*"
          target: "~/deploy-temp/frontend/"
          strip_components: 2
 
      # 6. Mover archivos, configurar Nginx y arrancar el backend
      - name: Desplegar y reiniciar servicios
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Mover backend a /opt/tasf
            sudo mkdir -p /opt/tasf
            sudo cp ~/deploy-temp/backend/*.jar /opt/tasf/
 
            # Mover frontend a /var/www/html
            sudo mkdir -p /var/www/html
            sudo cp -r ~/deploy-temp/frontend/* /var/www/html/
 
            # Configurar Nginx
            sudo tee /etc/nginx/sites-available/tasf > /dev/null <<'NGINX'
            server {
                listen 80;
                server_name _;
 
                root /var/www/html;
                index index.html;
 
                location / {
                    try_files $uri $uri/ /index.html;
                }
 
                location /api/ {
                    proxy_pass http://localhost:8080/;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }
            }
            NGINX
 
            sudo ln -sf /etc/nginx/sites-available/tasf /etc/nginx/sites-enabled/tasf
            sudo rm -f /etc/nginx/sites-enabled/default
 
            # Reiniciar backend
            sudo pkill -f "tasf.*\.jar" || true
            sleep 2
            sudo nohup java -jar /opt/tasf/*.jar > /var/log/tasf.log 2>&1 &
 
            # Recargar Nginx
            sudo nginx -t && sudo systemctl reload nginx
 
            echo "✅ Deploy completado"
